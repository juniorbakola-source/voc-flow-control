services:
  - type: web
    name: voc-telegram-bot
    runtime: node
    plan: free
    buildCommand: cd telegram-bot && npm install
    startCommand: cd telegram-bot && node index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
