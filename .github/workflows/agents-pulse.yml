name: 🤖 VOC Agents Pulse

on:
  schedule:
    # Aria & Kael: Every 2 hours
    - cron: '0 */2 * * *'
    # Sentry: Daily at 9:00 Africa/Lagos (UTC+1)
    - cron: '0 8 * * *'
    # Fixer: Every hour
    - cron: '0 * * * *'
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '20'
  TZ: 'Africa/Lagos'

jobs:
  # ==========================================
  # FRONTEND AGENT - Aria
  # ==========================================
  aria-frontend:
    name: 🎨 Aria (Frontend)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: interface/package.json

      - name: Install dependencies
        run: |
          cd interface
          npm ci

      - name: Run Aria - Frontend Analysis
        id: aria
        run: |
          echo "🎨 Aria starting frontend analysis..."
          node orchestrator/index.js --agent=aria --mode=pulse

      - name: Check bundle size
        run: |
          cd interface
          npm run build 2>&1 | tee build.log || true
          if [ -f "build.log" ]; then
            echo "📦 Bundle analysis complete"
            grep -E "(dist|build|size)" build.log || echo "Build completed"
          fi

      - name: Report to GitHub Issues (if issues found)
        if: failure() || steps.aria.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎨 [Aria] Frontend issues detected',
              body: `Aria detected issues during pulse check.\n\nRun: ${context.runId}\nTime: ${new Date().toISOString()}`,
              labels: ['frontend', 'aria', 'auto-detected']
            });

  # ==========================================
  # BACKEND AGENT - Kael
  # ==========================================
  kael-backend:
    name: ⚙️ Kael (Backend)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Kael - Backend Analysis
        id: kael
        run: |
          echo "⚙️ Kael starting backend analysis..."
          node orchestrator/index.js --agent=kael --mode=pulse

      - name: Check API structure
        run: |
          if [ -f "orchestrator/index.js" ]; then
            echo "✅ Orchestrator found"
            node -c orchestrator/index.js
          fi

      - name: Dependency check
        run: |
          if [ -f "interface/package.json" ]; then
            cd interface
            npm audit --audit-level=moderate || echo "⚠️ Audit completed with warnings"
          fi

  # ==========================================
  # SECURITY AGENT - Sentry
  # ==========================================
  sentry-security:
    name: 🔒 Sentry (Security)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secrets scanning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Sentry - Security Scan
        id: sentry
        run: |
          echo "🔒 Sentry starting security scan..."
          node orchestrator/index.js --agent=sentry --mode=pulse

      - name: Secret Detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Dependency vulnerability scan
        run: |
          if [ -f "interface/package.json" ]; then
            cd interface
            npm audit --json > audit.json || true
            if [ -f "audit.json" ]; then
              HIGH_SEVERITY=$(cat audit.json | jq '[.vulnerabilities[] | select(.severity == "high" or .severity == "critical")] | length' || echo "0")
              if [ "$HIGH_SEVERITY" -gt 0 ]; then
                echo "🚨 $HIGH_SEVERITY high/critical vulnerabilities found!"
                exit 1
              fi
            fi
          fi

      - name: Create Security Report Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 [Sentry] Security vulnerabilities detected',
              body: `Sentry detected security issues.\n\nRun: ${context.runId}\nTime: ${new Date().toISOString()}\n\nPlease review the security scan results.`,
              labels: ['security', 'sentry', 'critical', 'auto-detected']
            });

  # ==========================================
  # DEBUGGER AGENT - Fixer
  # ==========================================
  fixer-debug:
    name: 🔍 Fixer (Debugger)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Fixer - Debug Analysis
        id: fixer
        run: |
          echo "🔍 Fixer starting debug analysis..."
          node orchestrator/index.js --agent=fixer --mode=pulse

      - name: Lint Check
        run: |
          if [ -f "interface/package.json" ]; then
            cd interface
            if npm run lint 2>/dev/null; then
              echo "✅ Linting passed"
            else
              echo "⚠️ No lint script or linting issues found"
            fi
          fi

      - name: Type Check
        run: |
          if [ -f "interface/package.json" ]; then
            cd interface
            if npm run type-check 2>/dev/null || npx tsc --noEmit 2>/dev/null; then
              echo "✅ Type checking passed"
            else
              echo "ℹ️ No TypeScript config or type issues detected"
            fi
          fi

  # ==========================================
  # NOTIFICATIONS
  # ==========================================
  notify-completion:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [aria-frontend, kael-backend, sentry-security, fixer-debug]
    if: always()
    steps:
      - name: Report Status
        run: |
          echo "=== VOC Agents Pulse Complete ==="
          echo "Aria: ${{ needs.aria-frontend.result }}"
          echo "Kael: ${{ needs.kael-backend.result }}"
          echo "Sentry: ${{ needs.sentry-security.result }}"
          echo "Fixer: ${{ needs.fixer-debug.result }}"
          echo "Time: $(date -Iseconds)"
