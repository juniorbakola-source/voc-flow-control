name: 🤖 VOC Agents Pulse

on:
  schedule:
    # Aria & Kael: Every 2 hours
    - cron: '0 */2 * * *'
    # Sentry: Daily at 9:00 Africa/Lagos (UTC+1)
    - cron: '0 8 * * *'
    # Fixer: Every hour
    - cron: '0 * * * *'
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '20'
  TZ: 'Africa/Lagos'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ==========================================
  # FRONTEND AGENT - Aria
  # ==========================================
  aria-frontend:
    name: 🎨 Aria (Frontend)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🎨 Aria Analysis
        run: |
          echo "🎨 ARIA FRONTEND AGENT - ANALYSIS START"
          echo "======================================="
          echo "Timestamp: $(date)"
          echo "Timezone: $TZ"
          echo ""
          echo "📁 Repository structure:"
          ls -la
          echo ""
          echo "📦 Checking for frontend files..."
          find . -name "*.tsx" -o -name "*.ts" -o -name "*.jsx" -o -name "*.js" | head -20 || echo "No JS/TS files found"
          echo ""
          echo "✅ Aria analysis complete"

      - name: Check package.json
        run: |
          if [ -f "package.json" ]; then
            echo "📦 package.json found"
            cat package.json | head -20
          elif [ -f "interface/package.json" ]; then
            echo "📦 interface/package.json found"
          else
            echo "ℹ️ No package.json found - static project"
          fi

  # ==========================================
  # BACKEND AGENT - Kael
  # ==========================================
  kael-backend:
    name: ⚙️ Kael (Backend)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */2 * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ⚙️ Kael Analysis
        run: |
          echo "⚙️ KAEL BACKEND AGENT - ANALYSIS START"
          echo "======================================"
          echo "Timestamp: $(date)"
          echo ""
          echo "🔍 Checking backend structure..."
          find . -name "*.py" -o -name "*.go" -o -name "*.rs" -o -name "server.js" | head -10 || echo "No backend files found"
          echo ""
          echo "📁 Agents directory:"
          ls -la agents/ 2>/dev/null || echo "No agents directory"
          echo ""
          echo "✅ Kael analysis complete"

  # ==========================================
  # SECURITY AGENT - Sentry
  # ==========================================
  sentry-security:
    name: 🔒 Sentry (Security)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔒 Sentry Security Scan
        run: |
          echo "🔒 SENTRY SECURITY AGENT - SCAN START"
          echo "======================================"
          echo "Timestamp: $(date)"
          echo ""
          echo "🔍 Scanning for secrets in code..."
          grep -r "password\|secret\|token\|key" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null | grep -v node_modules | head -10 || echo "No obvious secrets found"
          echo ""
          echo "📄 Checking for .env files..."
          find . -name ".env*" -type f 2>/dev/null | head -5 || echo "No .env files found"
          echo ""
          echo "✅ Sentry scan complete"

      - name: Dependency audit (if package.json exists)
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=high || echo "⚠️ Audit completed"
          else
            echo "ℹ️ No package.json - skipping npm audit"
          fi
        continue-on-error: true

  # ==========================================
  # DEBUGGER AGENT - Fixer
  # ==========================================
  fixer-debug:
    name: 🔍 Fixer (Debugger)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Fixer Debug Analysis
        run: |
          echo "🔍 FIXER DEBUGGER AGENT - ANALYSIS START"
          echo "========================================="
          echo "Timestamp: $(date)"
          echo ""
          echo "🐛 Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME\|XXX\|HACK" --include="*.js" --include="*.ts" --include="*.tsx" --include="*.jsx" . 2>/dev/null | grep -v node_modules | head -10 || echo "No TODOs found"
          echo ""
          echo "📊 Git stats:"
          git log --oneline -5 2>/dev/null || echo "No git history"
          echo ""
          echo "✅ Fixer analysis complete"

  # ==========================================
  # NOTIFICATIONS
  # ==========================================
  notify-completion:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [aria-frontend, kael-backend, sentry-security, fixer-debug]
    if: always()
    steps:
      - name: Report Status
        run: |
          echo "=== VOC Agents Pulse Complete ==="
          echo "🎨 Aria: ${{ needs.aria-frontend.result }}"
          echo "⚙️ Kael: ${{ needs.kael-backend.result }}"
          echo "🔒 Sentry: ${{ needs.sentry-security.result }}"
          echo "🔍 Fixer: ${{ needs.fixer-debug.result }}"
          echo "Time: $(date -Iseconds)"

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failed = [];
            if ('${{ needs.aria-frontend.result }}' !== 'success') failed.push('🎨 Aria');
            if ('${{ needs.kael-backend.result }}' !== 'success') failed.push('⚙️ Kael');
            if ('${{ needs.sentry-security.result }}' !== 'success') failed.push('🔒 Sentry');
            if ('${{ needs.fixer-debug.result }}' !== 'success') failed.push('🔍 Fixer');
            
            if (failed.length > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🤖 [Agents] Pulse failures detected - ${new Date().toISOString().split('T')[0]}`,
                body: `## Agent Pulse Results

Failed agents: ${failed.join(', ')}

Run: ${context.runId}
Time: ${new Date().toISOString()}

Please check the workflow logs for details.`,
                labels: ['agents', 'pulse', 'failure']
              });
            }
