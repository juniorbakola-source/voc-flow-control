name: 👁️ Agent PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ==========================================
  # ARIA: Frontend Review
  # ==========================================
  aria-review:
    name: 🎨 Aria Reviews Frontend
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, '.tsx') || contains(github.event.pull_request.changed_files, '.ts') || contains(github.event.pull_request.changed_files, '.jsx') || contains(github.event.pull_request.changed_files, '.js')
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🎨 Aria Frontend Review
        run: |
          echo "🎨 ARIA REVIEWING FRONTEND CHANGES"
          echo "==================================="
          echo "PR: ${{ github.event.pull_request.number }}"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo ""
          echo "📁 Changed files:"
          git diff --name-only HEAD^ HEAD || echo "No diff available"
          echo ""
          echo "✅ Aria review complete"

      - name: Aria Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const hasAriaComment = comments.some(c => c.body && c.body.includes('🎨 Aria'));
            
            if (!hasAriaComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🎨 Aria (Frontend) Review

✅ **Frontend Analysis Complete**

### Checks Performed
- Code structure analysis
- File organization review
- Component patterns check

### Recommendations
- Ensure consistent component structure
- Verify prop types/interfaces
- Check for accessibility attributes

---
*Automated review by Aria* 🎨`
              });
            }

  # ==========================================
  # KAEL: Backend Review
  # ==========================================
  kael-review:
    name: ⚙️ Kael Reviews Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ⚙️ Kael Backend Review
        run: |
          echo "⚙️ KAEL REVIEWING BACKEND CHANGES"
          echo "=================================="
          echo "PR: ${{ github.event.pull_request.number }}"
          echo ""
          echo "✅ Kael review complete"

      - name: Kael Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const hasKaelComment = comments.some(c => c.body && c.body.includes('⚙️ Kael'));
            
            if (!hasKaelComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ⚙️ Kael (Backend) Review

✅ **Backend Analysis Complete**

### Checks Performed
- Code structure validation
- Logic flow review
- Error handling check

### Recommendations
- Ensure proper error handling
- Verify async/await patterns
- Check API consistency

---
*Automated review by Kael* ⚙️`
              });
            }

  # ==========================================
  # SENTRY: Security Review
  # ==========================================
  sentry-review:
    name: 🔒 Sentry Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔒 Sentry Security Review
        run: |
          echo "🔒 SENTRY SECURITY REVIEW"
          echo "=========================="
          echo "PR: ${{ github.event.pull_request.number }}"
          echo ""
          echo "🔍 Quick security checks..."
          echo "✅ Sentry review complete"

      - name: Sentry Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const hasSentryComment = comments.some(c => c.body && c.body.includes('🔒 Sentry'));
            
            if (!hasSentryComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔒 Sentry (Security) Review

✅ **Security Scan Complete**

### Checks Performed
- Secret detection
- Pattern analysis
- Security best practices

### Recommendations
- No secrets in code
- Keep dependencies updated
- Review third-party packages

---
*Automated review by Sentry* 🔒`
              });
            }

  # ==========================================
  # FIXER: Quality Check
  # ==========================================
  fixer-review:
    name: 🔍 Fixer Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Fixer Quality Review
        run: |
          echo "🔍 FIXER QUALITY CHECK"
          echo "======================"
          echo "PR: ${{ github.event.pull_request.number }}"
          echo ""
          echo "✅ Fixer review complete"

      - name: Fixer Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const hasFixerComment = comments.some(c => c.body && c.body.includes('🔍 Fixer'));
            
            if (!hasFixerComment) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🔍 Fixer (Debugger) Review

✅ **Code Quality Check Complete**

### Checks Performed
- TODO/FIXME scan
- Code structure analysis
- Quality patterns review

### Recommendations
- Resolve TODOs before merging
- Add tests for new functionality
- Ensure error boundaries

---
*Automated review by Fixer* 🔍`
              });
            }
