name: 👁️ Agent PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - 'interface/**'
      - 'orchestrator/**'
      - 'agents/**'

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ==========================================
  # ARIA: Frontend Review
  # ==========================================
  aria-review:
    name: 🎨 Aria Reviews Frontend
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'interface/') ||
      contains(github.event.pull_request.changed_files, '.tsx') ||
      contains(github.event.pull_request.changed_files, '.ts')
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: interface/package.json

      - name: Install dependencies
        run: |
          cd interface
          npm ci

      - name: Build check
        run: |
          cd interface
          npm run build 2>&1 | tee build.log

      - name: Aria Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const comment = `## 🎨 Aria (Frontend) Review

            ${buildStatus} **Build Check**

            ### Summary
            - Build status: ${buildStatus}
            - Files analyzed: React/TypeScript components
            - Timestamp: ${new Date().toISOString()}

            ### Recommendations
            - Ensure components are memoized where appropriate
            - Check for accessibility attributes
            - Verify responsive design breakpoints

            ---
            *Automated review by Aria* 🎨`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==========================================
  # KAEL: Backend Review
  # ==========================================
  kael-review:
    name: ⚙️ Kael Reviews Backend
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'orchestrator/') ||
      contains(github.event.pull_request.changed_files, '.js')
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Syntax check
        run: |
          node --check orchestrator/index.js

      - name: Kael Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## ⚙️ Kael (Backend) Review

            ✅ **Syntax Check Passed**

            ### Summary
            - Orchestrator code validated
            - Node.js syntax verified
            - Timestamp: ${new Date().toISOString()}

            ### Recommendations
            - Ensure error handling is comprehensive
            - Check for proper async/await patterns
            - Verify skill loading mechanisms

            ---
            *Automated review by Kael* ⚙️`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==========================================
  # SENTRY: Security Review
  # ==========================================
  sentry-review:
    name: 🔒 Sentry Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency audit
        run: |
          if [ -f "interface/package.json" ]; then
            cd interface
            npm audit --audit-level=high || true
          fi

      - name: Sentry Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const securityStatus = '${{ job.status }}' === 'success' ? '✅' : '⚠️';
            const comment = `## 🔒 Sentry (Security) Review

            ${securityStatus} **Security Scan Complete**

            ### Summary
            - Secrets detection: ${securityStatus}
            - Dependency audit: ${securityStatus}
            - Timestamp: ${new Date().toISOString()}

            ### Recommendations
            - No secrets should be committed to the repository
            - Keep dependencies updated
            - Review third-party package permissions

            ---
            *Automated review by Sentry* 🔒`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==========================================
  # FIXER: Debug & Quality Check
  # ==========================================
  fixer-review:
    name: 🔍 Fixer Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for TODO/FIXME
        run: |
          echo "🔍 Scanning for TODO/FIXME comments..."
          grep -r "TODO\|FIXME\|XXX" --include="*.js" --include="*.ts" --include="*.tsx" . || echo "No TODOs found"

      - name: Fixer Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🔍 Fixer (Debugger) Review

            ✅ **Code Quality Check**

            ### Summary
            - TODO/FIXME scan complete
            - Code structure analyzed
            - Timestamp: ${new Date().toISOString()}

            ### Recommendations
            - Resolve any TODO comments before merging
            - Ensure error boundaries are in place
            - Add tests for new functionality

            ---
            *Automated review by Fixer* 🔍`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
