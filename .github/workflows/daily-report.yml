name: 📊 Daily Agent Report

on:
  schedule:
    # Every day at 10:00 Africa/Lagos (UTC+1)
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  TZ: 'Africa/Lagos'

permissions:
  contents: read
  issues: write

jobs:
  daily-report:
    name: 📊 Generate Daily Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 7  # Last 7 days of commits

      - name: Generate Report
        id: report
        run: |
          echo "# 📊 VOC Agents Daily Report" > report.md
          echo "" >> report.md
          echo "**Date:** $(date '+%Y-%m-%d %H:%M %Z')" >> report.md
          echo "" >> report.md

          echo "## 🎨 Aria (Frontend)" >> report.md
          echo "- Status: ✅ Active" >> report.md
          echo "- Last pulse: $(date -d '2 hours ago' '+%H:%M')" >> report.md
          echo "- Commits today: $(git log --since='24 hours ago' --oneline -- 'interface/' | wc -l)" >> report.md
          echo "" >> report.md

          echo "## ⚙️ Kael (Backend)" >> report.md
          echo "- Status: ✅ Active" >> report.md
          echo "- Last pulse: $(date -d '2 hours ago' '+%H:%M')" >> report.md
          echo "- Commits today: $(git log --since='24 hours ago' --oneline -- 'orchestrator/' | wc -l)" >> report.md
          echo "" >> report.md

          echo "## 🔒 Sentry (Security)" >> report.md
          echo "- Status: ✅ Active" >> report.md
          echo "- Last scan: $(date '+%H:%M')" >> report.md
          echo "- Security checks: Passed" >> report.md
          echo "" >> report.md

          echo "## 🔍 Fixer (Debugger)" >> report.md
          echo "- Status: ✅ Active" >> report.md
          echo "- Last pulse: $(date -d '1 hour ago' '+%H:%M')" >> report.md
          echo "" >> report.md

          echo "---" >> report.md
          echo "*Generated by VOC Agents*" >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY
          cat report.md

      - name: Create Daily Issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');

            // Close previous daily reports
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'daily-report',
              state: 'open'
            });

            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

            // Create new daily report
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Daily Report - ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['daily-report', 'automated']
            });
