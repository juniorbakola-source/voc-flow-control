version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/interface"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
      - "auto-detected"
    reviewers:
      - "juniorbakola-source"
    assignees:
      - "juniorbakola-source"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "auto-detected"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
