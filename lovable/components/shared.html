<!-- ── Generate Agent modal ───────────────────────────────────────────────── -->
<div id="generate-modal" class="modal-backdrop">
  <div class="modal">
    <h2 class="modal-title">✨ Générer un Agent</h2>
    <div class="form-field">
      <label class="form-label" for="gen-name">Nom de l'agent</label>
      <input id="gen-name" class="form-input" type="text" placeholder="ex: Scout" />
    </div>
    <div class="form-field">
      <label class="form-label" for="gen-role">Rôle / Spécialité</label>
      <input id="gen-role" class="form-input" type="text" placeholder="ex: Data Analyst" />
    </div>
    <div class="form-field">
      <label class="form-label" for="gen-skills">Skills (séparés par des virgules)</label>
      <input id="gen-skills" class="form-input" type="text" placeholder="ex: Python, SQL, Pandas" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('generate-modal')">Annuler</button>
      <button class="btn btn-primary" onclick="generateAgent()">Créer l'agent</button>
    </div>
  </div>
</div>

<!-- ── Config modal ───────────────────────────────────────────────────────── -->
<div id="config-modal" class="modal-backdrop">
  <div class="modal">
    <h2 class="modal-title">⚙️ Configurer <span id="modal-agent-name"></span></h2>
    <div class="form-field">
      <label class="form-label" for="cfg-heartbeat">Fréquence heartbeat</label>
      <input id="cfg-heartbeat" class="form-input" type="text" placeholder="ex: 1h, 2h, 24h" />
    </div>
    <div class="form-field">
      <label class="form-label" for="cfg-priority">Priorité des tâches</label>
      <select id="cfg-priority" class="form-input">
        <option value="haute">Haute</option>
        <option value="normale" selected>Normale</option>
        <option value="basse">Basse</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label" for="cfg-notes">Notes / Instructions</label>
      <input id="cfg-notes" class="form-input" type="text" placeholder="Instructions supplémentaires…" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('config-modal')">Annuler</button>
      <button class="btn btn-primary" onclick="saveConfig()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
